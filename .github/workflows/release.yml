name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to publish from'
        required: true
      confirm:
        description: 'Type "publish" to confirm NuGet release'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(sed -n 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/p' src/BeatTrack.App/BeatTrack.App.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: beat-track-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all packages from CI run
        uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: package-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -lR artifacts
          echo "=== NuGet packages ==="
          ls -lR packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: preview

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      # Publish RID-specific packages first, then any, then pointer last
      - name: Publish packages
        run: |
          # 1. RID-specific AOT packages
          for pkg in packages/BeatTrack.win-*.nupkg packages/BeatTrack.linux-*.nupkg packages/BeatTrack.osx-*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing $pkg"
              dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done

          # 2. Any (non-AOT) package
          for pkg in packages/BeatTrack.any.*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing any package: $pkg"
              dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done

          # 3. Pointer package last (references all RID-specific packages)
          for pkg in packages/BeatTrack.[0-9]*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing pointer package: $pkg"
              dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: beat-track v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/beat-track-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            artifacts/beat-track-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            artifacts/beat-track-${{ steps.version.outputs.version }}-osx-arm64.tar.gz
            artifacts/beat-track-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/beat-track-${{ steps.version.outputs.version }}-win-arm64.zip
            packages/*.nupkg
