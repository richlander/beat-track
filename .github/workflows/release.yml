name: Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI run ID to download artifacts from'
        required: true
      confirmation:
        description: 'Type "release" to confirm'
        required: true

permissions:
  contents: write

jobs:
  release:
    if: github.event.inputs.confirmation == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=0.1.0" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: beat-track-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: ls -lR artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: beat-track v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/beat-track-linux-x64.tar.gz
            artifacts/beat-track-linux-arm64.tar.gz
            artifacts/beat-track-osx-arm64.tar.gz
            artifacts/beat-track-win-x64.zip
            artifacts/beat-track-win-arm64.zip
