name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: preview

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/p' src/BeatTrack.App/BeatTrack.App.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish AOT
        run: >
          dotnet publish src/BeatTrack.App/BeatTrack.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -o publish

      - name: Smoke test
        if: "!contains(matrix.rid, 'arm64') || contains(matrix.os, 'arm')"
        shell: bash
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            ./publish/beat-track.exe status
          else
            ./publish/beat-track status
          fi

      - name: Package (tar.gz)
        if: "!startsWith(matrix.rid, 'win-')"
        shell: bash
        run: tar -czf beat-track-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz -C publish beat-track

      - name: Package (zip)
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: Compress-Archive -Path publish/beat-track.exe -DestinationPath beat-track-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-track-${{ steps.version.outputs.version }}-${{ matrix.rid }}
          path: beat-track-${{ steps.version.outputs.version }}-${{ matrix.rid }}.*

  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: preview

      - name: Pack pointer package
        run: dotnet pack src/BeatTrack.App -c Release -p:OfficialBuild=true

      - name: Upload pointer package
        uses: actions/upload-artifact@v4
        with:
          name: package-pointer
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack any (non-AOT) package
        run: dotnet pack src/BeatTrack.App -c Release -r any -p:PublishAot=false -p:OfficialBuild=true

      - name: Upload any package
        uses: actions/upload-artifact@v4
        with:
          name: package-any
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack linux-x64 AOT package
        run: dotnet pack src/BeatTrack.App -c Release -r linux-x64 -p:OfficialAotBuild=true

      - name: Upload linux-x64 package
        uses: actions/upload-artifact@v4
        with:
          name: package-linux-x64
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Install tool from local packages
        run: dotnet tool install --global BeatTrack --add-source ./artifacts/package/release --no-cache

      - name: Smoke test - help
        run: |
          OUTPUT=$(beat-track --help)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "beat-track"

      - name: Smoke test - status
        run: beat-track status

      - name: Uninstall tool
        run: dotnet tool uninstall --global BeatTrack

  pack-rid:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: preview

      - name: Pack RID-specific package
        run: dotnet pack src/BeatTrack.App -c Release -r ${{ matrix.rid }} -p:OfficialAotBuild=true

      - name: Upload RID package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.rid }}
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error
